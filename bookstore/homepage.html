<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Online BookStore</title>
        <link rel = "stylesheet" href="style.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    </head>
    <body>
        <header class="navbar">
    <h1 class="logo">Online BookStore</h1>
     <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Categories</a>
     </nav>
     <div class="search-bar">
        <input type="text" placeholder="Search books...">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>
    <div class="nav-icons">
        <i class ="fa-regular fa-heart fav-icon" onclick="toggleHeart(this)"></i>
        <a href="../pages/signin.html"><i class = "fa-regular fa-user"></i></a>
        <i class = "ti ti-moon" id="theme-toggle"></i>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <h1>Discover Your Next Favorite Book</h1>
    <p>Explore thousands of books across every genre.</p>
    <button>Browse Collection</button>
  </section>

  <!-- POPULAR BOOKS -->
  <section class="section">
    <div class="section-header">
      <h2>Popular Books</h2>
      <a href="#">View all</a>
    </div>

    <div class="book-container" id="bookList">
      <!-- Books will come from JS -->
    </div>
  </section>

  <!-- CONTINUE READING -->
  <section class="section">
    <div class="section-header">
      <h2>Continue Reading</h2>
      <a href="#">View all</a>
    </div>

    <div class="book-container" id="continueReading">
      <!-- JS -->
    </div>
  </section>

  <!-- YOUR LIST -->
  <section class="section">
    <div class="section-header">
      <h2>Your List</h2>
      <a href="#">View all</a>
    </div>

    <div class="book-container" id="yourList">
      <!-- JS -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 BookStore. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    // Simple theme toggle logic
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
      if (document.body.classList.contains('dark-theme'))
    {
      toggle.className = 'ti ti-sun';
    }
    else{
      toggle.className= 'ti ti-moon';
    }
    });
  </script>
</body>
</html>
